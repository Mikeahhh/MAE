# Base Configuration for Sound-UAV SpecMAE
# 所有场景共享的基础配置
#
# Per-scenario overrides (norm stats, optimal mask_ratio) are in:
#   configs/desert_config.yaml
#   configs/forest_config.yaml
#
# The default mask_ratio (0.75) is the MAE paper baseline.
# Actual optimal values differ per scenario and are determined by
# the mask-ratio sweep (scripts/train/train_mask_ratio_sweep.py)
# evaluated via detection accuracy (scripts/eval/eval_detection_timing.py).

# Model Architecture
model:
  name: "SpecMAE"
  type: "vit_base"
  encoder:
    embed_dim: 768
    depth: 12
    num_heads: 12
  decoder:
    embed_dim: 512
    depth: 4
    num_heads: 8
  patch:
    size: 16
    stride: 16
  mask:
    ratio: 0.75           # default; override per scenario

# Audio Processing
audio:
  sample_rate: 48000
  duration: 1.0           # seconds per training clip
  feature:
    n_mels: 128
    n_fft: 1024
    hop_length: 480       # → ~101 frames @ 48kHz/1s (padded to 112 in model)

# Training
training:
  epochs: 100             # sweep uses 100; final training can use 200+
  batch_size: 32
  optimizer:
    type: "AdamW"
    lr: 1.0e-4
    weight_decay: 0.05
    warmup_epochs: 10
    min_lr: 1.0e-6

# Seed
seed: 42
